<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Войти — Plume Connect</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body>

<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-bg-gradient"></div>
    <div class="auth-bg-grid"></div>
  </div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <a href="index.html" class="auth-logo-mark">🪶</a>
      <h2>Plume Connect</h2>
    </div>

    <!-- Title -->
    <div class="auth-title">С возвращением</div>
    <p class="auth-subtitle">Введите данные для входа в личный кабинет</p>

    <!-- Alert -->
    <div class="alert alert-error" id="loginAlert">
      <i class="fas fa-circle-exclamation"></i>
      <span id="loginAlertMsg">Неверный email или пароль</span>
    </div>

    <div class="alert alert-success" id="loginSuccess">
      <i class="fas fa-circle-check"></i>
      <span>Вход выполнен! Перенаправляем...</span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="form-input-wrapper">
          <i class="fas fa-envelope form-input-icon"></i>
          <input
            type="email"
            id="email"
            class="form-input has-icon"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <span class="form-error" id="emailError">Введите корректный email</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <div class="form-input-wrapper">
          <i class="fas fa-lock form-input-icon"></i>
          <input
            type="password"
            id="password"
            class="form-input has-icon"
            placeholder="Ваш пароль"
            autocomplete="current-password"
            required
          />
          <button type="button" class="form-input-toggle" id="togglePassword" tabindex="-1">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
        <span class="form-error" id="passwordError">Введите пароль</span>
      </div>

      <button type="submit" class="btn btn-cta btn-full" id="loginBtn" style="margin-top:8px;">
        <i class="fas fa-right-to-bracket"></i>
        Войти
      </button>
    </form>

    <div class="auth-divider">или</div>

    <a href="register.html" class="btn btn-ghost btn-full">
      <i class="fas fa-user-plus"></i>
      Создать аккаунт
    </a>

    <div class="auth-footer">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
  // If already logged in — redirect
  (async () => {
    const session = await checkSession();
    if (session) window.location.href = 'dashboard.html';
  })();

  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const loginAlert = document.getElementById('loginAlert');
  const loginSuccess = document.getElementById('loginSuccess');
  const loginAlertMsg = document.getElementById('loginAlertMsg');

  // Password toggle
  document.getElementById('togglePassword').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
  });

  // Form submission
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // Validation
    let valid = true;

    if (!email || !email.includes('@')) {
      showFieldError('emailError', 'email');
      valid = false;
    } else {
      hideFieldError('emailError', 'email');
    }

    if (!password) {
      showFieldError('passwordError', 'password');
      valid = false;
    } else {
      hideFieldError('passwordError', 'password');
    }

    if (!valid) return;

    // Loading state
    loginBtn.classList.add('btn-loading');
    loginBtn.disabled = true;
    loginAlert.classList.remove('show');

    try {
      const result = await loginUser(email, password);

      if (result.success) {
        loginSuccess.classList.add('show');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        loginAlertMsg.textContent = result.error || 'Неверный email или пароль';
        loginAlert.classList.add('show');
        loginBtn.classList.remove('btn-loading');
        loginBtn.disabled = false;
      }
    } catch (err) {
      loginAlertMsg.textContent = 'Ошибка соединения. Попробуйте позже.';
      loginAlert.classList.add('show');
      loginBtn.classList.remove('btn-loading');
      loginBtn.disabled = false;
    }
  });

  function showFieldError(errorId, inputId) {
    document.getElementById(errorId).classList.add('show');
    document.getElementById(inputId).classList.add('error');
  }

  function hideFieldError(errorId, inputId) {
    document.getElementById(errorId).classList.remove('show');
    document.getElementById(inputId).classList.remove('error');
  }

  // Clear errors on input
  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      loginAlert.classList.remove('show');
    });
  });
</script>
</body>
</html>
